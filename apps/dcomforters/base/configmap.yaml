apiVersion: v1
kind: ConfigMap
metadata:
  name: dcomforters-config
  namespace: production
  labels:
    app: dcomforters-kitchen
data:
  NODE_ENV: "production"
  PORT: "3000"
  APP_NAME: "Dcomforters Kitchen"
  LOG_LEVEL: "info"
  TZ: "America/New_York"
  ALLOWED_ORIGINS: "https://dcomforters.yourdomain.com"
  DJANGO_SETTINGS_MODULE: "secondproject.settings"
  OTEL_SERVICE_NAME: "dcomforters-kitchen"
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=dcomforters,deployment.environment=production"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_LOGS_EXPORTER: "none"
