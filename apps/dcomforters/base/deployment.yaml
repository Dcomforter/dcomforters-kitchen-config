apiVersion: apps/v1
kind: Deployment
metadata:
  name: dcomforters-kitchen
  namespace: production
  labels:
    app: dcomforters-kitchen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dcomforters-kitchen
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: dcomforters-kitchen
    spec:
      serviceAccountName: dcomforters-sa
      imagePullSecrets:
        - name: ghcr-pull-secret
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          nodeTaintsPolicy: Honor
          nodeAffinityPolicy: Honor
          labelSelector:
            matchLabels:
              app: dcomforters-kitchen
      containers:
        - name: app
          image: ghcr.io/<your-org>/dcomforters-kitchen:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: dcomforters-config
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 12
            periodSeconds: 5
      terminationGracePeriodSeconds: 30
